{% extends "base.html" %}
{% load crispy_forms_tags i18n %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
  <h2 style="margin-top: 0; margin-bottom: 1.5rem;">
    {% if object %}{% trans "Edit Bale" %}{% else %}{% trans "Add Bale" %}{% endif %}
  </h2>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    
    <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap;">
      <button type="submit" class="btn" style="background: var(--primary); color: white;">
        {% trans "Save" %}
      </button>
      <a href="{% url 'tracker:bale_list' %}" class="btn" style="background: var(--bg-secondary); color: var(--text);">
        {% trans "Cancel" %}
      </a>
    </div>
  </form>
</div>
{% endblock %}
